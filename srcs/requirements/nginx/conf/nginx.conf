server {
    # Listen on 443 with TLS.
    listen 443 ssl;

    server_name mlorenzo.42.fr;

    ssl_protocols TLSv1.2 TLSv1.3;

    # The self-signed certificate and key generated in the Dockerfile.
    ssl_certificate     /etc/nginx/ssl/inception.crt;
    ssl_certificate_key /etc/nginx/ssl/inception.key;

    # The WordPress files.
    root  /var/www/html;
    index index.php;

    # For a normal request, serve the file if it exists, otherwise let WordPress
    # handle it through index.php
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # For a PHP request, forward it over FastCGI to php-fpm in the wordpress container.
    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  wordpress:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }
}