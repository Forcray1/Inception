[www]

; Run the PHP worker processes as the web server user.
user = www-data
group = www-data

; Listen on TCP port 9000 on all interfaces, so nginx can connect across the
; docker network with: fastcgi_pass wordpress:9000
listen = 0.0.0.0:9000

; Process manager settings: how many PHP worker processes php-fpm keeps ready.
; "dynamic" means it scales the number of workers between the limits below.
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Send php-fpm worker output to the container logs (stderr) so "docker logs"
; and "make logs" show PHP errors.
catch_workers_output = yes
