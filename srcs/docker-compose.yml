services:

  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    restart: always
    networks:
      - inception
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_root_password
      - db_password
    expose:
      - "3306"
    healthcheck:
      test: ['CMD-SHELL', 'unset MYSQL_HOST; mariadb-admin ping -u root -p"$(cat /run/secrets/db_root_password)" --silent']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    expose:
      - "9000"

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    restart: always
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html:ro
    ports:
      - "443:443"
    env_file:
      - .env

networks:
  inception:
    name: inception
    driver: bridge

# The two named volumes. Bind mounts are forbidden for these, so they are named
# volumes. The options below make each named volume store its data in a folder
# under /home/mlorenzo/data on the host. This is still a named volume,
# which is what the subject asks for.
volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mlorenzo/data/mariadb

  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mlorenzo/data/wordpress

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
